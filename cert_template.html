<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Certificazione Elettrica</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#e0e0e0;font-family:Calibri,Arial,sans-serif;font-size:10pt;padding:20px;}
.toolbar{max-width:210mm;margin:0 auto 14px;display:flex;gap:10px;}
.toolbar button{padding:7px 18px;background:#1a56db;color:#fff;border:none;border-radius:5px;font-size:13px;cursor:pointer;font-family:inherit;}
.toolbar button:hover{background:#1e40af;}

/* Pagina A4 verticale */
.page{width:210mm;min-height:297mm;background:#fff;margin:0 auto;padding:12mm 10mm 10mm 10mm;box-shadow:0 2px 16px rgba(0,0,0,.18);display:flex;flex-direction:column;}
.page+.page{margin-top:20px;}

/* Header */
.logo-img{height:10mm;display:block;}
.cert-title{text-align:center;font-size:18pt;font-weight:700;margin-bottom:6mm;}

/* Progetto */
.progetto-row{display:flex;align-items:stretch;border:1px solid #000;margin-bottom:5mm;}
.progetto-lbl{padding:4px 8px;font-size:9pt;white-space:nowrap;border-right:1px solid #000;display:flex;align-items:center;}
.progetto-val{padding:4px 10px;font-size:9pt;font-weight:700;display:flex;align-items:center;}

/* Sottotitolo tabella */
.cert-sub{font-size:10pt;margin-bottom:3mm;}

/* Tabella apparati */
.cert-table{width:100%;border-collapse:collapse;table-layout:auto;margin-bottom:5mm;}
.cert-table th{background:#ffff00;font-weight:700;font-size:9pt;padding:4px 5px;border:1px solid #000;text-align:center;}
.cert-table td{border:1px solid #000;padding:3px 5px;font-size:9pt;vertical-align:middle;text-align:center;height:7mm;}

/* Nota disclaimer */
.nota{font-size:8pt;color:#ff0000;line-height:1.5;margin-bottom:6mm;}

/* Area firme */
.firme-section{margin-top:auto;}
.data-verifica{font-size:11pt;margin-bottom:6mm;}
.firma-row{display:flex;align-items:flex-end;gap:6mm;margin-bottom:5mm;}
.firma-label{font-size:10pt;white-space:nowrap;min-width:68mm;}
.firma-line-box{flex:1;display:flex;flex-direction:column;gap:2mm;}
.firma-line{border-bottom:1px solid #000;height:6mm;}
.firma-sub{font-size:9pt;text-align:center;}

/* Footer tabella */
.footer-table{width:100%;border-collapse:collapse;margin-top:8mm;}
.footer-table td{border:1px solid #000;padding:4px 8px;font-size:9pt;}
.footer-left{width:25mm;text-align:center;font-weight:700;}
.footer-right{text-align:center;font-style:italic;}

/* Watermark */
.watermark{text-align:center;font-size:7pt;color:#666;font-style:italic;margin-top:3mm;}

/* Righe vuote nella tabella: numero fisso di righe */
.cert-table tbody tr.empty-row td{height:7mm;}

@media print{
  body{background:#fff;padding:0;}
  .toolbar{display:none!important;}
  .page{box-shadow:none;padding:10mm 8mm 8mm 8mm;width:210mm;min-height:297mm;margin:0;page-break-after:always;}
  .page:last-of-type{page-break-after:auto;}
  @page{size:A4 portrait;margin:0;}
}
</style>
</head>

// N. righe minime per riempire la tabella (escluse quelle con dati)
const MIN_ROWS = 10;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Testi disclaimer ──────────────────────────────────────────────────────────
const NOTA_STANDARD = '(*) ATTENZIONE: con riferimento al documento tecnico TIIT_INF_NO1400011, l\'installazione di apparati informatici non dotati di doppia alimentazione, comporta che il Cliente accetta esplicitamente che gli stessi sono connessi ad una sola delle due linee di alimentazione disponibili, con conseguente decadimento dello SLA impiantistico e la possibilità che tali apparati possano subire la disalimentazione durante le eventuali attività di manutenzione programmate e/o straordinarie';

const NOTA_CSE = '(*) ATTENZIONE: con riferimento al documento tecnico TIIT_INF_NO1400011, l\'installazione di apparati informatici non dotati di doppia alimentazione, comporta che gli stessi sono connessi ad una sola delle due linee di alimentazione disponibili, con conseguente applicazione dello SLA impiantistico come da OFF-5629-TIM-DORA-Moving di sala 1 presso Data Center TIM Bologna \u2013 Riferimento offerta fornitore: PROT.OP380984.';

// ── Render principale ─────────────────────────────────────────────────────────
function renderCert(d) {
  const container = document.getElementById('pages-container');
  container.innerHTML = '';
  document.title = `Cert_${d.cliente || ''}_${d.data_cert || ''}`;

  const isCse     = d.tipo_cert === 'cse';
  const apparati  = d.apparati || [];
  const nota      = isCse ? NOTA_CSE : NOTA_STANDARD;

  // Paginazione: massimo MIN_ROWS righe dati per pagina, ma almeno 1 pagina
  const pageSize  = MIN_ROWS;
  const chunks    = [];
  if (apparati.length === 0) {
    chunks.push([]);
  } else {
    for (let i = 0; i < apparati.length; i += pageSize) {
      chunks.push(apparati.slice(i, i + pageSize));
    }
  }

  chunks.forEach((chunk, pi) => {
    const page = document.createElement('div');
    page.className = 'page';

    // ── Righe tabella ──
    const dataRows = chunk.map(a => `
      <tr>
        <td>${esc(a.costruttore)}</td>
        <td>${esc(a.modello)}</td>
        <td style="font-family:monospace;font-size:8pt;">${esc(a.asset)}</td>

        <td>${esc(a.sala)}</td>
        <td>${esc(a.inter)}</td>
        <td>${esc(a.quadro)}</td>
      </tr>`).join('');

    // Righe vuote per completare fino a MIN_ROWS
    const emptyCount = Math.max(0, MIN_ROWS - chunk.length);
    const emptyRows  = Array(emptyCount).fill(
      '<tr class="empty-row"><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>'

    const dataStr = d.data_cert

      : '';

    page.innerHTML = `

            <th>Sala /<br>areola</th>

          </tr>
        </thead>
        <tbody>
          ${dataRows}
          ${emptyRows}
        </tbody>
      </table>

      <div class="nota">${esc(nota)}</div>

      <div class="firme-section">
        <div class="data-verifica">La verifica è stata effettuata in data : <span style="text-decoration:underline;">&nbsp;&nbsp;&nbsp;&nbsp;${esc(dataStr)}&nbsp;&nbsp;&nbsp;&nbsp;</span></div>

        <div class="firma-row">
          <div class="firma-label">Firma Impianti &amp; Logistica:</div>
          <div class="firma-line-box">
            <div class="firma-line"></div>
            <div class="firma-sub">(Nome e cognome per esteso)</div>
          </div>
          <div class="firma-line-box">
            <div class="firma-line"></div>
            <div class="firma-sub">&nbsp;</div>
          </div>
        </div>

        <div class="firma-row">
          <div class="firma-label">Firma Presidio Tecnologico</div>
          <div class="firma-line-box">
            <div class="firma-line"></div>
            <div class="firma-sub">(Nome e cognome per esteso)</div>
          </div>
          <div class="firma-line-box">
            <div class="firma-line"></div>
            <div class="firma-sub">&nbsp;</div>
          </div>
        </div>

        <div class="firma-row">
          <div class="firma-label">Firma Fornitore/manutentore dell'hardware</div>
          <div class="firma-line-box">
            <div class="firma-line"></div>

          </div>
          <div class="firma-line-box">
            <div class="firma-line"></div>

        <table class="footer-table">

        <div class="watermark">Gruppo TIM &ndash; Uso Interno &ndash; Tutti i diritti riservati.</div>

    `;

    container.appendChild(page);
  });
}
