<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Certificazione Elettrica</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family: 'Times New Roman', Times, serif;font-size:10pt;padding:20px;}
.toolbar{max-width:297mm;margin:0 auto 14px;display:flex;gap:10px;}
.toolbar button{padding:7px 18px;background:#1a56db;color:#fff;border:none;border-radius:5px;font-size:13px;cursor:pointer;font-family:inherit;}
.toolbar button:hover{background:#1e40af;}

/* Pagina A4 verticale */
.page{width:297mm;min-height:210mm;background:#fff;margin:0 auto;padding:15mm 24mm;box-shadow:0 2px 16px rgba(0,0,0,.18);display:flex;flex-direction:column;}
.page+.page{margin-top:20px;}

/* Header */
.logo-img{height:13mm;display:block;}
.cert-title{text-align:center;font-size:18pt;margin:6mm 40mm 0 0;flex:1;}

/* Progetto */
.progetto-row{display:flex;align-items:stretch;margin-bottom:2mm;}
.progetto-lbl{padding:4px 8px;white-space:nowrap;display:flex;align-items:center;}
.progetto-val{padding:4px 10px;font-weight:700;display:flex;align-items:center;border:1px solid #000;flex:1;margin:0mm 5mm;font-size:11pt;font-family:Calibri;}

/* Sottotitolo tabella */
.cert-sub{margin-bottom:3mm;padding:0px 8px}

/* Tabella apparati */
.cert-table{width:100%;border-collapse:collapse;table-layout:auto;margin-bottom:3mm;}
.cert-table th{background:#ff9900;font-weight:700;padding:2px 5px;border:1px solid #000;text-align:center;}
.cert-table td{border:1px solid #000;padding:3px 5px;vertical-align:middle;text-align:center;height:7mm;font-family:Calibri;font-size:11pt;}

/* Nota disclaimer */
.nota{font-size:9pt;color:#ff0000;margin-bottom:4mm;font-family: Arial, Helvetica, sans-serif;}

/* Area firme */
.firme-section{margin-top:auto;}
.data-verifica{font-size:12pt;margin-bottom:4mm;display:flex;}
.data-under{border-bottom:1px solid #000;text-align:center;flex:1;margin:0 2mm}
.firma-row{display:flex;align-items:flex-end;gap:2mm;margin-bottom:4mm;padding:0 7%;}
.firma-label{white-space:nowrap;min-width:65mm;}
.firma-line-box{border-bottom:1px solid #000;flex:1;display:flex;flex-direction:column;gap:2mm;}
.firma-sub{text-align:center;}

/* Footer tabella */
.footer-table{display:flex;text-align:center;margin:8mm 3mm 3mm 0;padding:0px;border:1px solid #000;font-size:9pt;font-family: Arial;font-weight:700;text-wrap:nowrap;}
.footer-left{width:45mm;border-right:1px solid #000;padding:12px}
.footer-right{font-style:italic;flex:1;padding:4px}

/* Watermark */
.watermark{text-align:center;font-size:8pt;color:#4472c4;margin-top:3mm;font-family:Cambria;}

/* Righe vuote nella tabella: numero fisso di righe */
.cert-table tbody tr.empty-row td{height:4mm;}

@media print{
  * { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  body{background:#fff;padding:0;}
  .toolbar{display:none!important;}
  .page{box-shadow:none;padding:10mm 24mm 8mm;width:297mm;min-height:210mm;margin:0;page-break-after:always;}
  .page:last-of-type{page-break-after:auto;}
  @page{size:A4 landscape;margin:0;}
}
</style>
</head>

// N. righe minime per riempire la tabella (escluse quelle con dati)
const MIN_ROWS = 10;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── Testi disclaimer ──────────────────────────────────────────────────────────
const NOTA_STANDARD = '(*) ATTENZIONE: con riferimento al documento tecnico TIIT_INF_NO1400011, l\'installazione di apparati informatici non dotati di doppia alimentazione, comporta che il Cliente accetta esplicitamente che gli stessi sono connessi ad una sola delle due linee di alimentazione disponibili, con conseguente decadimento dello SLA impiantistico e la possibilità che tali apparati possano subire la disalimentazione durante le eventuali attività di manutenzione programmate e/o straordinarie';

const NOTA_CSE = '(*) ATTENZIONE: con riferimento al documento tecnico TIIT_INF_NO1400011, l\'installazione di apparati informatici non dotati di doppia alimentazione, comporta che gli stessi sono connessi ad una sola delle due linee di alimentazione disponibili, con conseguente applicazione dello SLA impiantistico come da OFF-5629-TIM-DORA-Moving di sala 1 presso Data Center TIM Bologna \u2013 ';

// ── Render principale ─────────────────────────────────────────────────────────
function renderCert(d) {
  const container = document.getElementById('pages-container');
  container.innerHTML = '';
  document.title = `${d.cliente || ''} scheda di certificazione elettrica ${d.incident || ''}`;

  const isCse     = d.tipo_cert === 'cse';
  const apparati  = d.apparati || [];
  const nota      = isCse ? NOTA_CSE : NOTA_STANDARD;
  const notacse   = '<span style="background-color:#ff0"> Riferimento offerta fornitore: PROT.OP380984. </span>';

  // Paginazione: massimo MIN_ROWS righe dati per pagina, ma almeno 1 pagina
  const pageSize  = MIN_ROWS;
  const chunks    = [];
  if (apparati.length === 0) {
    chunks.push([]);
  } else {
    for (let i = 0; i < apparati.length; i += pageSize) {
      chunks.push(apparati.slice(i, i + pageSize));
    }
  }

  chunks.forEach((chunk, pi) => {
    const page = document.createElement('div');
    page.className = 'page';

    // ── Righe tabella ──
    const dataRows = chunk.map(a => `
      <tr>
        <td>${esc(a.costruttore)}</td>
        <td>${esc(a.modello)}</td>
        <td>${esc(a.asset)}</td>
        <td>${esc(a.serial_number)}</td>
        <td>${esc(a.mono_alimentato)}</td>
        <td>${esc(a.rack)}</td>
        <td>${esc(a.fornitore)}</td>
        <td>${esc(a.sala)}</td>
        <td>${esc(a.inter)}</td>
        <td>${esc(a.quadro)}</td>
      </tr>`).join('');

    // Righe vuote per completare fino a MIN_ROWS
    const emptyCount = Math.max(0, MIN_ROWS - chunk.length);
    const emptyRows  = Array(emptyCount).fill(
      '<tr class="empty-row"><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td><td></td></tr>'
    ).join('');

    const dataStr = d.data_cert
      ? new Date(d.data_cert + 'T00:00:00').toLocaleDateString('it-IT')
      : '';

    page.innerHTML = `
      <div style="display:flex;margin-bottom:4mm;">
        <img class="logo-img" src="${LOGO_SRC}" alt="Noovle">
        <div class="cert-title">Scheda di certificazione elettrica</div>
      </div>

      <div class="progetto-row">
        <div class="progetto-lbl">Progetto di Riferimento / Codice Piattaforma</div>
        <div class="progetto-val">${isCse?"CLIENTE CSE – PROGETTO TIM TLC23MSLTPATO- SALA L0":esc(d.progetto_riferimento || '')}</div>
      </div>

      <div class="cert-sub">Si certifica la corretta predisposizione elettrica dei seguenti apparati:</div>

      <table class="cert-table">
        <thead>
          <tr>
            <th>Costruttore</th>
            <th>Modello</th>
            <th>Asset Number</th>
            <th>Serial Number</th>
            <th>MONO-<br>Alimentato<br>SI / NO (*)</th>
            <th>Rack</th>
            <th>Fornitore<br>Manutentore<br>dell'hardware</th>
            <th>Sala /<br>areola</th>
            <th>Inter.</th>
            <th>Quadro</th>
          </tr>
        </thead>
        <tbody>
          ${dataRows}
          ${emptyRows}
        </tbody>
      </table>

      <div class="nota">${esc(nota)} ${isCse?notacse:""}</div>

      <div class="firme-section">
        <div class="data-verifica">
          <div style="display:flex;flex:0 0 50%">
            <div>La verifica è stata effettuata in data :</div>
            <div class="data-under">${esc(dataStr)}</div>
          </div>
        </div>
        
        <div class="firma-row">
          <div class="firma-label">Firma Impianti &amp; Logistica:</div>
          <div class="firma-line-box"></div>
          <div class="firma-sub">(Nome e cognome per esteso)</div>
          <div class="firma-line-box"></div>
        </div>

        <div class="firma-row">
          <div class="firma-label">Firma Presidio Tecnologico:</div>
          <div class="firma-line-box"></div>
          <div class="firma-sub">(Nome e cognome per esteso)</div>
          <div class="firma-line-box"></div>
        </div>

        <div class="firma-row">
          <div class="firma-label">Firma Fornitore/manutentore dell'hardware:</div>
          <div class="firma-line-box"></div>
          <div class="firma-sub">(Nome e cognome per esteso)</div>
          <div class="firma-line-box"></div>
        </div>

        <div class="footer-table">
          <div class="footer-left">I.DC/NE</div>
          <div class="footer-right"><strong>NOOVLE</strong><br><em>Tutti i diritti riservati</em></div>
        </div>

        <div class="watermark">Gruppo TIM &ndash; Uso Interno &ndash; Tutti i diritti riservati.</div>
      </div>
    `;

    container.appendChild(page);
  });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
const raw = sessionStorage.getItem('cert_data');
if (raw) {
  try {
    renderCert(JSON.parse(raw));
  } catch(e) { console.error('cert_data parse error', e); }
} else {
  // Fallback: pagina vuota di esempio
  renderCert({
    tipo_cert: 'cse',
    progetto_riferimento: 'IFICONSULTING - 2012163007',
    cliente: 'IFICONSULTING',
    data_cert: new Date().toISOString().split('T')[0],
    incident: 'INC000007342134',
    apparati: [
      { costruttore:'HPE', modello:'Proliant DL360 gen12', asset:'2023016760', serial_number:'CZUD3V00YF', mono_alimentato:'NO', rack:'201263007', fornitore:'IFICONSULTING', sala:'SalaC0/H4', inter:'INT0031', quadro:'A + B' },

    ]
  });
}
