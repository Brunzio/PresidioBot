<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Site Report</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#e0e0e0;font-family:Calibri,Arial,sans-serif;font-size:10pt;padding:20px;}
.toolbar{max-width:297mm;margin:0 auto 14px;display:flex;gap:10px;}
.toolbar button{padding:7px 18px;background:#1a56db;color:#fff;border:none;border-radius:5px;font-size:13px;cursor:pointer;font-family:inherit;}
.toolbar button:hover{background:#1e40af;}
.page{width:297mm;min-height:210mm;background:#fff;margin:0 auto;padding:8mm 7mm 6mm 7mm;box-shadow:0 2px 16px rgba(0,0,0,.18);display:flex;flex-direction:column;}
.page+.page{margin-top:20px;}

/* Header */
.logo-img{height:10mm;display:block;}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1mm;}
.hdr-center{text-align:center;flex:1;}
.hdr-inc{font-size:18pt;font-weight:700;letter-spacing:1px;}
.hdr-tipo{font-size:14pt;font-weight:700;margin-top:2px;}
.hdr-right{font-size:18pt;font-weight:700;text-align:right;white-space:nowrap;}
.sezione-bar{display:flex;align-items:center;padding:2px 5px;margin:2mm 0 0 0;font-size:11pt;}
.sezione-lbl{font-size:18pt;font-weight:700;margin-right:10px;}
.sezione-center{flex:1;text-align:center;}
.foglio{margin-left:auto;}

/* ── LAYOUT COLONNE (max 5 apparati) ── */
.col-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.col-table td{border:1px solid #000;vertical-align:middle;}
.col-lbl{background:#b3f0ff;color:#ff0000;font-weight:900;font-size:8.5pt;padding:0px;text-align:center;height:7mm}
.col-val{font-size:9pt;padding:3px 6px;text-align:center;}
.col-hdr{background:#b3f0ff;font-weight:700;font-size:10pt;text-align:center;padding:4px;color:#ff0000;border:1px solid #000;}
.col-empty{background:#ffffff;border:1px solid #000;}

/* ── LAYOUT RIGHE (max 18 apparati) ── */
.row-table{width:100%;border-collapse:collapse;table-layout:auto;}
.row-table th{background:#b3f0ff;color:#ff0000;font-weight:700;font-size:9.5pt;padding:4px 5px;border:1px solid #000;text-align:center;}
.row-table td{border:1px solid #000;padding:3px 5px;font-size:10pt;vertical-align:middle;text-align:center;height:7mm;}
.row-table tbody tr:nth-child(even) td{background:#f5f5f5;}

/* Footer bolla */
.bolla-footer{margin-top:auto;padding-top:6mm;display:grid;justify-content:right;align-items:flex-end;}
.bolla-txt{font-size:10pt;font-weight:700;}
.firma-area{text-align:center;}
.firma-line{border-top:1px solid #000;width:55mm;margin:0 auto 2px;}
.firma-lbl{font-size:10pt;font-style:italic;}
.watermark{text-align:center;font-size:7pt;color:#666;font-style:italic;margin-top:3mm;}

@media print{
  body{background:#fff;padding:0;}
  .toolbar{display:none!important;}
  .page{box-shadow:none;padding:6mm 6mm 5mm 6mm;width:297mm;min-height:210mm;margin:0;page-break-after:always;}
  .page:last-of-type{page-break-after:auto;}
  @page{size:A4 landscape;margin:0;}
}
</style>
</head>

    <span class="sezione-lbl">${esc(d.cliente || 'CLIENTE')}</span>

  <div class="sezione-bar">
    <span>Sezione Site Preparation</span>
    <span class="sezione-center">PARAMETRI PER L'ATTIVAZIONE DEI SERVIZI GROUND \u2013 FIELD</span>
    <span class="foglio">Foglio ${pag}/${totPag}</span>
  </div>`;
}

function bollaFooterHTML(d) {
  const num   = d.numero_bolla || 'Px';
  const datab = d.data_bolla ? new Date(d.data_bolla).toLocaleDateString('it-IT') : '??/??/????';
  const txt   = num ? `Bolla d\u2019uscita n\u00b0 ${esc(num)} del ${esc(datab)}` : '';
  return `
  <div class="bolla-footer">
    <div class="bolla-txt">${txt}<br><br>&nbsp;</div>
    <div class="firma-area">
      <div class="firma-line"></div>
      <div class="firma-lbl"><em>Timbro e Firma</em></div>
    </div>
  </div>
  <div class="watermark">Gruppo TIM \u2013 Uso Interno \u2013 Tutti i diritti riservati.</div>`;
}

// ── RENDER COLONNE ────────────────────────────────────────────────────────────
function renderColonne(d) {
  const apparati = d.apparati || [];
  const chunks = [];
  for (let i = 0; i < Math.max(apparati.length, 1); i += N_COL) {
    chunks.push(apparati.slice(i, i + N_COL));
  }
  const totPag = chunks.length;
  const container = document.getElementById('pages-container');
  container.innerHTML = '';
  document.title = `Site_${d.tipo || ''}_${d.cliente || ''}_${d.incident || ''}`;

  chunks.forEach((chunk, pi) => {
    const page = document.createElement('div');
    page.className = 'page';

    // Intestazione colonne (Apparato ×5)
    const nCol = N_COL;
    let hdrRow = `<col style="width:150px;">`;
    for (let c = 0; c < nCol; c++) hdrRow += `<col>`;

    let hdrCells = `<td class="col-lbl" style="background:#fff;color:#000;border:0px;"></td>`;
    for (let c = 0; c < nCol; c++) {
      hdrCells += `<td class="col-hdr">Apparato</td>`;
    }

    let rows = '';
    CAMPI_COLONNE.forEach(f => {
      let tr = `<tr><td class="col-lbl">${esc(f.lbl)}</td>`;
      for (let c = 0; c < nCol; c++) {
        if (c < chunk.length) {
          const val = (f.key === '_') ? '' : (chunk[c][f.key] || '');
          tr += `<td class="col-val">${esc(val)}</td>`;
        } else {
          tr += `<td class="col-empty"></td>`;
        }
      }
      tr += '</tr>';
      rows += tr;
    });

    page.innerHTML =
      headerHTML(d, pi + 1, totPag) +
      `<table class="col-table">
        <colgroup>${hdrRow}</colgroup>
        <tbody>
          <tr>${hdrCells}</tr>
          ${rows}
        </tbody>
      </table>` +
      bollaFooterHTML(d);

    container.appendChild(page);
  });
}

// ── RENDER RIGHE ──────────────────────────────────────────────────────────────
function renderRighe(d) {
  const apparati = d.apparati || [];
  const chunks = [];
  for (let i = 0; i < Math.max(apparati.length, 1); i += N_RIG) {
    chunks.push(apparati.slice(i, i + N_RIG));
  }
  const totPag = chunks.length;
  const container = document.getElementById('pages-container');
  container.innerHTML = '';
  document.title = `Site_${d.tipo || ''}_${d.cliente || ''}_${d.incident || ''}`;

  chunks.forEach((chunk, pi) => {
    const page = document.createElement('div');
    page.className = 'page';

    // Riempi righe vuote fino a N_RIG
    const rows = [...chunk];
    while (rows.length < N_RIG) rows.push(null);

    const tbody = rows.map(r => {
      if (!r) return `<tr><td></td><td></td><td></td><td></td><td></td></tr>`;
      return `<tr>
        <td>${esc(r.tipologia)}</td>
        <td>${esc(r.modello)}</td>
        <td>${esc(r.serial_number)}</td>
        <td>${esc(r.asset)}</td>
        <td>${esc(r.rack)}</td>
      </tr>`;
    }).join('');

    page.innerHTML =
      headerHTML(d, pi + 1, totPag) +
      `<table class="row-table">
        <thead><tr>
          <th>Tipologia</th>
          <th>Marca \u2013 Modello</th>
          <th>Serial Number</th>
          <th>ASSET</th>
          <th>Rack</th>
        </tr></thead>
        <tbody>${tbody}</tbody>
      </table>` +
      bollaFooterHTML(d);

    container.appendChild(page);
  });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
const raw = sessionStorage.getItem('site_data');
if (raw) {
  try {
    const d = JSON.parse(raw);
    if (d.layout === 'righe') renderRighe(d);
    else renderColonne(d);
  } catch(e) { console.error('site_data parse error', e); }
